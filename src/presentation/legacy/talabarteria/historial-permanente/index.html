<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Talabartería</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="stylesheet" href="../../shared/css/estilos.css">
</head>
<body>
<div id="header"></div>
<main id="app" class="max-w-2xl mx-auto w-full pb-28 px-4"></main>
<div id="modal-root"></div>

<script src="../../shared/js/datos.js"></script>
<script src="../../shared/js/ui.js"></script>
<script>
renderHeader({ title:'Historial de Talabartería', backHref:'../index.html', homeHref:'../index.html' });

/* Historial de sólo lectura: muestra todos los servicios
   registrados por día, con detalles del cliente y precio.
   Nunca se elimina. */
const days = listDays(state.services, s => s.createdAt);

function toggleDay(day) {
  const el = document.getElementById('day-' + day);
  const icon = document.getElementById('icon-' + day);
  el.classList.toggle('hidden');
  icon.textContent = el.classList.contains('hidden') ? 'expand_more' : 'expand_less';
}

function paint(){
  const rows = days.map(dayStr => {
    const dayServices = state.services.filter(s => dayKey(s.createdAt) === dayStr).sort((a,b) => b.createdAt - a.createdAt);
    const dayTotal = dayServices.reduce((a, s) => a + (Number(s.price) || 0), 0);
    
    return `
      <div class="card mb-3 overflow-hidden">
        <button class="w-full p-4 flex justify-between items-center bg-white" onclick="toggleDay('${dayStr}')">
          <span class="font-bold text-[#57423f]">Fecha: ${new Date(dayStr+'T00:00:00').toLocaleDateString('es-MX')}</span>
          <span id="icon-${dayStr}" class="material-symbols-outlined text-[#8C261F]">expand_more</span>
        </button>
        <div id="day-${dayStr}" class="hidden border-t border-[#D4A373]/20 bg-[#FEF9F0]/50">
          <div class="p-4">
             <p class="text-sm font-bold text-[#8C261F] mb-2">Total día: ${money(dayTotal)} (${dayServices.length} servicios)</p>
             <div class="space-y-2">
                ${dayServices.map(s => `
                  <div class="flex items-center justify-between bg-white p-3 rounded-lg border border-[#D4A373]/20">
                    <div>
                      <h3 class="font-semibold text-sm">${esc(s.customer)}</h3>
                      <p class="text-[#57423f] text-xs">${esc(s.productType)} - ${esc(s.serviceRequested)}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-[#8C261F] text-sm">${money(s.price || 0)}</p>
                    </div>
                  </div>
                `).join('')}
             </div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="fade-in">
      <div class="my-4">
        <h2 class="text-xl font-bold">Historial permanente</h2>
        <p class="text-xs text-[#57423f]">Registro por día de todos los servicios realizados. Este historial nunca se elimina.</p>
      </div>
      <div class="space-y-2">
        ${days.length ? rows : '<p class="text-center text-[#57423f] py-10">Aún no hay servicios registrados.</p>'}
      </div>
    </div>
  `;
}
paint();


</script>
</body>
</html>
