<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo · Tienda de Abarrotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="stylesheet" href="../../shared/css/estilos.css">
</head>
<body>
<div id="header"></div>
<main id="app" class="max-w-2xl mx-auto w-full pb-28 px-4"></main>
<div id="modal-root"></div>

<script src="../../shared/js/datos.js"></script>
<script src="../../shared/js/ui.js"></script>
<script>
renderHeader({ title:'Nueva Venta', backHref:'../index.html', homeHref:'../index.html' });

function changeQty(id, delta){
  const cart = state.cart;
  const item = cart.find(x=>x.id===id);
  const p = state.products.find(x=>x.id===id);
  
  if(item){
    const newQty = item.qty + delta;
    if(newQty > (p.stock || 0)) return; // No exceder stock
    
    if(newQty <= 0) state.cart = cart.filter(x=>x.id!==id);
    else { item.qty = newQty; state.cart = cart; }
  } else if(delta > 0){
    if(1 > (p.stock || 0)) return; // No exceder stock
    cart.push({ id:p.id, name:p.name, price:p.price, qty:1 });
    state.cart = cart;
  }
  paint();
}

function setQty(id, value){
  const qty = parseInt(value) || 0;
  const p = state.products.find(x=>x.id===id);
  
  if(qty > (p.stock || 0)) return; // No exceder stock

  const cart = state.cart;
  const item = cart.find(x=>x.id===id);
  if(item){
    if(qty <= 0) state.cart = cart.filter(x=>x.id!==id);
    else { item.qty = qty; state.cart = cart; }
  } else if(qty > 0){
    cart.push({ id:p.id, name:p.name, price:p.price, qty:qty });
    state.cart = cart;
  }
  paint();
}

function paint(){
  const list = state.products;
  const container = document.getElementById('app');
  
  if(!container.innerHTML) {
    container.innerHTML = `
      <div class="fade-in mt-6 pb-20">
        <div id="product-list" class="space-y-4"></div>
      </div>
      <div id="cart-footer" class="fixed bottom-0 left-0 right-0 p-4 bg-[#FEF9F0] border-t border-[#D4A373]/30"></div>
    `;
  }

  const listContainer = document.getElementById('product-list');
  listContainer.innerHTML = list.map(p => {
    const cartItem = state.cart.find(x=>x.id===p.id);
    const qty = cartItem ? cartItem.qty : 0;
    return `
      <div class="card p-4 flex items-center justify-between">
        <div>
          <h3 class="font-semibold">${esc(p.name)}</h3>
          <p class="text-[#57423f] text-sm">${money(p.price)} · Cantidad: ${p.stock || 0}</p>
        </div>
        ${qty > 0 ? `
          <div class="flex items-center gap-1">
            <button class="w-9 h-9 flex items-center justify-center bg-gray-100 rounded-lg hover:bg-gray-200" onclick="changeQty(${p.id}, -1)">-</button>
            <input type="number" min="1" max="${p.stock || 0}" value="${qty}" class="w-14 text-center border border-[#D4A373] rounded-lg p-1" onchange="setQty(${p.id}, this.value)">
            <button class="w-9 h-9 flex items-center justify-center bg-gray-100 rounded-lg hover:bg-gray-200 ${qty >= (p.stock || 0) ? 'opacity-50' : ''}" onclick="changeQty(${p.id}, 1)">+</button>
          </div>
        ` : `
          <button class="btn-primary tap w-11 h-11 flex items-center justify-center ${ (p.stock || 0) === 0 ? 'opacity-50' : ''}" onclick="changeQty(${p.id}, 1)">
            <span class="material-symbols-outlined">add</span>
          </button>
        `}
      </div>
    `;
  }).join('');

  document.getElementById('cart-footer').innerHTML = `
    <div class="max-w-2xl mx-auto flex items-center justify-between gap-4">
      <p class="text-lg font-bold text-[#8C261F]">Total: ${money(cartTotal())}</p>
      <a href="../confirmar-venta/index.html" class="btn-primary px-8 py-3 ${state.cart.length === 0 ? 'opacity-50 pointer-events-none' : ''}">
        Finalizar Venta
      </a>
    </div>
  `;
}
paint();
</script>
</body>
</html>
