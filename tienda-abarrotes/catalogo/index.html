<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo · Tienda de Abarrotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="stylesheet" href="../../shared/css/estilos.css">
</head>
<body>
<div id="header"></div>
<main id="app" class="max-w-2xl mx-auto w-full pb-28 px-4"></main>
<div id="modal-root"></div>

<script src="../../shared/js/datos.js"></script>
<script src="../../shared/js/ui.js"></script>
<script>
renderHeader({ title:'Nueva Venta', backHref:'../index.html', homeHref:'../index.html' });

/* editMode:false -> modo venta normal (agregar al carrito)
   editMode:true  -> catálogo editable: cambiar nombre/precio,
   borrar individual o en conjunto, y guardar los cambios.
   `working` es una copia local; nada se persiste en
   localStorage hasta pulsar "Guardar cambios". */
let editMode = false;
let working = [];
let selected = new Set();

function addToCart(id){
  const p = state.products.find(x=>x.id===id);
  const cart = state.cart;
  const item = cart.find(x=>x.id===id);
  if(item) item.qty++;
  else cart.push({ id:p.id, name:p.name, price:p.price, qty:1 });
  state.cart = cart;
  paint();
}

function toggleEditMode(){
  editMode = !editMode;
  if(editMode){
    working = state.products.map(p => ({...p}));
    selected = new Set();
  }
  paint();
}

function toggleSelect(id){
  if(selected.has(id)) selected.delete(id); else selected.add(id);
  paint();
}

function updateField(id, field, value){
  const item = working.find(x=>x.id===id);
  if(!item) return;
  if(field === 'price'){ item.price = parseFloat(value) || 0; }
  else { item.name = value; }
}

function confirmDeleteOne(id){
  const p = working.find(x=>x.id===id);
  if(!p) return;
  showModal(`
    <div class="card p-6 max-w-sm w-full text-center space-y-4 fade-in">
      <div class="w-16 h-16 mx-auto bg-[#ffdad6] rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined text-[#ba1a1a] text-[36px]">delete</span>
      </div>
      <h2 class="text-lg font-bold">Eliminar producto</h2>
      <p class="text-[#57423f]">¿Seguro que desea quitar "${esc(p.name)}" del catálogo? Los cambios se aplicarán al pulsar "Guardar cambios".</p>
      <div class="flex flex-col gap-2 pt-2">
        <button class="btn-ghost tap w-full py-3" onclick="closeModal()">Cancelar</button>
        <button class="btn-primary tap w-full py-3 !bg-[#ba1a1a]" onclick="deleteOne(${id})">Sí, quitar</button>
      </div>
    </div>
  `);
}
function deleteOne(id){
  working = working.filter(x=>x.id!==id);
  selected.delete(id);
  closeModal();
  paint();
}

function confirmDeleteSelected(){
  if(selected.size === 0) return;
  showModal(`
    <div class="card p-6 max-w-sm w-full text-center space-y-4 fade-in">
      <div class="w-16 h-16 mx-auto bg-[#ffdad6] rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined text-[#ba1a1a] text-[36px]">delete_sweep</span>
      </div>
      <h2 class="text-lg font-bold">Eliminar productos seleccionados</h2>
      <p class="text-[#57423f]">Se quitarán ${selected.size} producto(s) del catálogo al pulsar "Guardar cambios". ¿Desea continuar?</p>
      <div class="flex flex-col gap-2 pt-2">
        <button class="btn-ghost tap w-full py-3" onclick="closeModal()">Cancelar</button>
        <button class="btn-primary tap w-full py-3 !bg-[#ba1a1a]" onclick="deleteSelected()">Sí, quitar todos</button>
      </div>
    </div>
  `);
}
function deleteSelected(){
  working = working.filter(x=>!selected.has(x.id));
  selected = new Set();
  closeModal();
  paint();
}

function cancelEdit(){
  editMode = false;
  working = [];
  selected = new Set();
  paint();
}

function saveChanges(){
  state.products = working.map(p => ({ id:p.id, name:(p.name||'').trim() || 'Producto sin nombre', price: Number(p.price) || 0 }));
  editMode = false;
  working = [];
  selected = new Set();
  paint();
}

function paint(){
  const list = editMode ? working : state.products;

  const rows = list.map(p => editMode ? `
    <div class="card p-4 flex items-center gap-3">
      <input type="checkbox" class="w-5 h-5 flex-shrink-0 accent-[#8C261F]" ${selected.has(p.id)?'checked':''} onchange="toggleSelect(${p.id})">
      <div class="flex-grow grid grid-cols-1 gap-2">
        <input type="text" value="${esc(p.name)}" oninput="updateField(${p.id},'name',this.value)" placeholder="Nombre del producto">
        <input type="number" min="0" step="0.01" value="${p.price}" oninput="updateField(${p.id},'price',this.value)" placeholder="Precio">
      </div>
      <button class="btn-ghost tap w-11 h-11 flex items-center justify-center flex-shrink-0" title="Eliminar" onclick="confirmDeleteOne(${p.id})">
        <span class="material-symbols-outlined text-[#ba1a1a]">delete</span>
      </button>
    </div>
  ` : `
    <div class="card p-4 flex items-center justify-between">
      <div>
        <h3 class="font-semibold">${esc(p.name)}</h3>
        <p class="text-[#57423f] text-sm">${money(p.price)}</p>
      </div>
      <button class="btn-primary tap w-11 h-11 flex items-center justify-center" onclick="addToCart(${p.id})">
        <span class="material-symbols-outlined">add</span>
      </button>
    </div>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div class="fade-in">
      <div class="flex items-center justify-between my-4 gap-2">
        <h2 class="text-xl font-bold">Catálogo</h2>
        <div class="flex items-center gap-2">
          ${!editMode ? `
            <a href="../agregar-producto/index.html" class="btn-secondary tap px-4 py-2 text-sm flex items-center gap-1">
              <span class="material-symbols-outlined text-[18px]">add</span> Producto
            </a>
            <button class="btn-ghost tap px-4 py-2 text-sm flex items-center gap-1" onclick="toggleEditMode()">
              <span class="material-symbols-outlined text-[18px]">edit</span> Editar
            </button>
          ` : `
            <button class="btn-ghost tap px-4 py-2 text-sm flex items-center gap-1 ${selected.size?'':'opacity-40 pointer-events-none'}" onclick="confirmDeleteSelected()">
              <span class="material-symbols-outlined text-[18px]">delete_sweep</span> Quitar (${selected.size})
            </button>
          `}
        </div>
      </div>
      ${editMode ? `<p class="text-xs text-[#57423f] -mt-2 mb-3">Edite nombre y precio, seleccione productos para quitarlos en conjunto o use el ícono de basura para quitar uno solo. Los cambios se guardan al pulsar "Guardar cambios".</p>` : ''}
      <div class="space-y-3">${rows || '<p class="text-center text-[#57423f] py-10">No hay productos aún.</p>'}</div>
    </div>
  `;

  if(editMode){
    document.getElementById('app').insertAdjacentHTML('beforeend', `
      <div class="fixed bottom-0 left-0 w-full bg-[#fff0ee] border-t border-[#D4A373]/30 px-4 py-4 z-30">
        <div class="max-w-2xl mx-auto flex gap-2">
          <button class="btn-ghost tap flex-1 py-3" onclick="cancelEdit()">Cancelar</button>
          <button class="btn-primary tap flex-1 py-3 flex items-center justify-center gap-2" onclick="saveChanges()">
            <span class="material-symbols-outlined text-[18px]">save</span> Guardar cambios
          </button>
        </div>
      </div>
    `);
    return;
  }

  const bar = cartCount() > 0 ? `
    <a href="../carrito/index.html" class="fixed bottom-4 left-4 right-4 max-w-2xl mx-auto tap card !bg-[#8C261F] !border-0 text-white rounded-xl px-5 py-4 flex items-center justify-between shadow-xl z-30">
      <span class="flex items-center gap-2 font-semibold"><span class="material-symbols-outlined">shopping_cart</span> ${cartCount()} artículo(s)</span>
      <span class="font-bold text-lg">${money(cartTotal())}</span>
    </a>` : '';
  document.getElementById('app').insertAdjacentHTML('beforeend', bar);
}
paint();
</script>
</body>
</html>
