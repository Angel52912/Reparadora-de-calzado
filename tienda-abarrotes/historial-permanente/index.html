<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Tienda de Abarrotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="stylesheet" href="../../shared/css/estilos.css">
</head>
<body>
<div id="header"></div>
<main id="app" class="max-w-2xl mx-auto w-full pb-28 px-4"></main>
<div id="modal-root"></div>

<script src="../../shared/js/datos.js"></script>
<script src="../../shared/js/ui.js"></script>
<script>
renderHeader({ title:'Historial de Abarrotes', backHref:'../index.html', homeHref:'../index.html' });

/* Este historial es de sólo lectura: agrupa TODOS los productos
   vendidos en un día (sin repetirlos) junto con la cantidad total
   vendida de cada uno. No ofrece ninguna opción para eliminar
   registros; los datos permanecen para siempre en el sistema. */
const days = listDays(state.sales, s => s.createdAt);

function toggleDay(day) {
  const el = document.getElementById('day-' + day);
  const icon = document.getElementById('icon-' + day);
  el.classList.toggle('hidden');
  icon.textContent = el.classList.contains('hidden') ? 'expand_more' : 'expand_less';
}

function paint(){
  const rows = days.map(dayStr => {
    const items = aggregateSalesByDay(dayStr);
    const dayTotal = items.reduce((a,i)=>a+i.qty*i.price,0);
    const unitsTotal = items.reduce((a,i)=>a+i.qty,0);
    
    return `
      <div class="card mb-3 overflow-hidden">
        <button class="w-full p-4 flex justify-between items-center bg-white" onclick="toggleDay('${dayStr}')">
          <span class="font-bold text-[#57423f]">Fecha: ${new Date(dayStr+'T00:00:00').toLocaleDateString('es-MX')}</span>
          <span id="icon-${dayStr}" class="material-symbols-outlined text-[#8C261F]">expand_more</span>
        </button>
        <div id="day-${dayStr}" class="hidden border-t border-[#D4A373]/20 bg-[#FEF9F0]/50">
          <div class="p-4">
             <p class="text-sm font-bold text-[#8C261F] mb-2">Total vendido: ${money(dayTotal)} (${unitsTotal} unidades)</p>
             <div class="space-y-2">
                ${items.map((it,idx) => `
                  <div class="flex items-center justify-between bg-white p-3 rounded-lg border border-[#D4A373]/20">
                    <div>
                      <h3 class="font-semibold text-sm">${esc(it.name)}</h3>
                      <p class="text-[#57423f] text-xs">${money(it.price)} c/u</p>
                    </div>
                    <div class="text-right">
                        <span class="font-bold text-sm bg-[#D4A373]/20 px-2 py-1 rounded-full">${it.qty}</span>
                        <p class="font-bold text-[#8C261F] text-sm">${money(it.qty*it.price)}</p>
                    </div>
                  </div>
                `).join('')}
             </div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="fade-in">
      <div class="my-4">
        <h2 class="text-xl font-bold">Historial permanente</h2>
        <p class="text-xs text-[#57423f]">Registro por día de todos los productos vendidos. Este historial nunca se elimina.</p>
      </div>
      <div class="space-y-2">
        ${days.length ? rows : '<p class="text-center text-[#57423f] py-10">Aún no hay ventas registradas.</p>'}
      </div>
    </div>
  `;
}
paint();

</script>
</body>
</html>
