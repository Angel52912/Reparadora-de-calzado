<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmar Venta · Tienda de Abarrotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="stylesheet" href="../../shared/css/estilos.css">
</head>
<body>
<div id="header"></div>
<main id="app" class="max-w-2xl mx-auto w-full pb-28 px-4"></main>
<div id="modal-root"></div>

<script src="../../shared/js/datos.js"></script>
<script src="../../shared/js/ui.js"></script>
<script>
if(state.cart.length === 0) location.href = '../catalogo/index.html';

renderHeader({ title:'Venta', backHref:'../carrito/index.html', homeHref:'../index.html' });

const rows = state.cart.map(i => `
  <div class="card p-4 flex items-center justify-between">
    <div>
      <h3 class="font-semibold">${esc(i.name)}</h3>
      <p class="text-[#57423f] text-sm">${i.qty} unidad(es)</p>
    </div>
    <span class="font-bold text-[#8C261F]">${money(i.qty*i.price)}</span>
  </div>
`).join('');
const total = cartTotal();

document.getElementById('app').innerHTML = `
  <div class="fade-in">
    <div class="my-4">
      <h2 class="text-xl font-bold text-[#8C261F]">Resumen de Venta</h2>
      <p class="text-[#57423f] text-sm">Confirme los productos antes de procesar el pago.</p>
    </div>
    <div class="space-y-3">${rows}</div>
    <div class="card p-5 mt-6 space-y-2">
      <div class="flex justify-between text-[#57423f] text-sm"><span>Subtotal</span><span>${money(total)}</span></div>
      <div class="flex justify-between text-[#57423f] text-sm"><span>IVA</span><span>$0.00</span></div>
      <div class="border-t border-dashed border-[#D4A373]/60 my-1"></div>
      <div class="flex justify-between items-end"><span class="font-bold uppercase tracking-wide text-sm">Total</span><span class="text-2xl font-bold text-[#8C261F]">${money(total)}</span></div>
    </div>
  </div>
`;

document.getElementById('app').insertAdjacentHTML('beforeend', `
  <div class="fixed bottom-0 left-0 w-full bg-[#fff0ee] border-t border-[#D4A373]/30 px-4 py-4 space-y-2 z-30">
    <div class="max-w-2xl mx-auto space-y-2">
      <button id="confirmBtn" class="btn-primary tap w-full py-4 text-[17px] flex items-center justify-center gap-2" onclick="confirmarVenta()">
        Confirmar Venta <span class="material-symbols-outlined">check_circle</span>
      </button>
      <a href="../carrito/index.html" class="btn-ghost tap w-full py-2 flex items-center justify-center">Cancelar y volver</a>
    </div>
  </div>
`);

function confirmarVenta(){
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.innerHTML = 'Procesando…';
  setTimeout(() => {
    const sale = { id: Date.now(), items: state.cart.map(i=>({name:i.name, qty:i.qty, price:i.price})), total: cartTotal(), createdAt: Date.now() };
    const sales = state.sales;
    sales.unshift(sale);
    state.sales = sales;
    state.cart = [];
    if(navigator.vibrate) navigator.vibrate(150);
    showModal(`
      <div class="card p-6 max-w-sm w-full text-center space-y-3 fade-in">
        <div class="w-20 h-20 mx-auto bg-[#8C261F]/10 rounded-full flex items-center justify-center">
          <span class="material-symbols-outlined fill text-[44px] text-[#8C261F]">check_circle</span>
        </div>
        <h2 class="text-lg font-bold">Venta registrada</h2>
        <p class="text-[#57423f]">La transacción se ha completado con éxito.</p>
        <a href="../index.html" class="btn-primary tap w-full py-3 mt-2 block">Aceptar</a>
      </div>
    `);
  }, 600);
}
</script>
</body>
</html>
