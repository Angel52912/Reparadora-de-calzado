<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito · Tienda de Abarrotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="stylesheet" href="../../shared/css/estilos.css">
</head>
<body>
<div id="header"></div>
<main id="app" class="max-w-2xl mx-auto w-full pb-28 px-4"></main>
<div id="modal-root"></div>

<script src="../../shared/js/datos.js"></script>
<script src="../../shared/js/ui.js"></script>
<script>
renderHeader({ title:'Registro', backHref:'javascript:confirmCancelVenta()', homeHref:'../index.html' });

function changeQty(id, delta){
  const cart = state.cart;
  const item = cart.find(x=>x.id===id);
  if(!item) return;
  item.qty += delta;
  state.cart = item.qty <= 0 ? cart.filter(x=>x.id!==id) : cart;
  paint();
}

function confirmCancelVenta(){
  showModal(`
    <div class="card p-6 max-w-sm w-full text-center space-y-4 fade-in">
      <div class="w-16 h-16 mx-auto bg-[#ffdad6] rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined text-[#ba1a1a] text-[36px]">warning</span>
      </div>
      <h2 class="text-lg font-bold">Confirmar acción</h2>
      <p class="text-[#57423f]">¿Seguro que quiere cancelar? Perderá todos los artículos registrados en esta venta actual.</p>
      <div class="flex flex-col gap-2 pt-2">
        <button class="btn-primary tap w-full py-3" onclick="closeModal()">Volver a la venta</button>
        <button class="btn-ghost tap w-full py-3" onclick="cancelVenta()">Sí, cancelar</button>
      </div>
    </div>
  `);
}
function cancelVenta(){
  state.cart = [];
  location.href = '../index.html';
}

function paint(){
  const rows = state.cart.map(i => `
    <div class="card p-4 flex items-center justify-between">
      <div>
        <h3 class="font-semibold">${esc(i.name)}</h3>
        <p class="text-[#57423f] text-sm">${money(i.price)} c/u</p>
      </div>
      <div class="flex items-center gap-4">
        <div class="stepper flex items-center border border-[#8b716e55] rounded-full overflow-hidden">
          <button class="tap" onclick="changeQty(${i.id},-1)"><span class="material-symbols-outlined text-[18px]">remove</span></button>
          <span class="px-2 font-semibold w-6 text-center">${i.qty}</span>
          <button class="tap" onclick="changeQty(${i.id},1)"><span class="material-symbols-outlined text-[18px]">add</span></button>
        </div>
        <p class="font-bold min-w-[64px] text-right">${money(i.qty*i.price)}</p>
      </div>
    </div>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div class="fade-in mt-4 space-y-3">
      ${rows || '<p class="text-center text-[#57423f] py-10">El carrito está vacío.</p>'}
      <div class="flex justify-center pt-2">
        <a href="../catalogo/index.html" class="btn-secondary tap px-6 py-3 flex items-center gap-2">
          <span class="material-symbols-outlined text-[18px]">add</span> Agregar producto
        </a>
      </div>
    </div>
  `;

  document.getElementById('app').insertAdjacentHTML('beforeend', `
    <div class="fixed bottom-0 left-0 w-full bg-[#fff0ee] border-t border-[#D4A373]/30 px-4 py-4 z-30">
      <div class="max-w-2xl mx-auto">
        <a href="${state.cart.length ? '../confirmar-venta/index.html' : '#'}" class="btn-primary tap w-full py-4 text-[17px] flex items-center justify-center gap-2 ${state.cart.length ? '' : 'opacity-40 pointer-events-none'}">
          <span class="material-symbols-outlined">point_of_sale</span> Continuar · ${money(cartTotal())}
        </a>
      </div>
    </div>
  `);
}
paint();
</script>
</body>
</html>
