<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agregar Producto · Tienda de Abarrotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="stylesheet" href="../../shared/css/estilos.css">
</head>
<body>
<div id="header"></div>
<main id="app" class="max-w-2xl mx-auto w-full pb-28 px-4"></main>
<div id="modal-root"></div>

<script src="../../shared/js/datos.js"></script>
<script src="../../shared/js/ui.js"></script>
<script>
renderHeader({ title:'Agregar Producto', backHref:'../catalogo/index.html', homeHref:'../index.html' });

let price = 0;
let stock = 0;
function adjustPrice(amount){
  price = Math.max(0, price + amount);
  document.getElementById('price').value = price.toFixed(2);
}
function adjustStock(amount){
  stock = Math.max(0, stock + amount);
  document.getElementById('stock').value = stock;
}

document.getElementById('app').innerHTML = `
  <form id="form-producto" class="fade-in space-y-5 mt-4">
    <div>
      <label for="product_name">Nombre del producto</label>
      <input id="product_name" type="text" placeholder="Ej. Arroz 1kg" required>
    </div>
    <div>
      <label for="price">Precio unitario</label>
      <div class="flex items-center gap-2">
        <button type="button" class="w-12 h-12 flex items-center justify-center bg-gray-100 rounded-lg hover:bg-gray-200" onclick="adjustPrice(-1)">-</button>
        <input id="price" type="number" step="0.01" value="0.00" class="!text-center" oninput="price = parseFloat(this.value) || 0" onkeydown="return event.keyCode !== 69" required>
        <button type="button" class="w-12 h-12 flex items-center justify-center bg-gray-100 rounded-lg hover:bg-gray-200" onclick="adjustPrice(1)">+</button>
      </div>
    </div>
    <div>
      <label for="stock">Cantidad Inicial</label>
      <div class="flex items-center gap-2">
        <button type="button" class="w-12 h-12 flex items-center justify-center bg-gray-100 rounded-lg hover:bg-gray-200" onclick="adjustStock(-1)">-</button>
        <input id="stock" type="number" value="0" class="!text-center" oninput="stock = parseInt(this.value) || 0" onkeydown="return event.keyCode !== 69" required>
        <button type="button" class="w-12 h-12 flex items-center justify-center bg-gray-100 rounded-lg hover:bg-gray-200" onclick="adjustStock(1)">+</button>
      </div>
    </div>
    <button type="submit" class="btn-primary tap w-full py-4 text-[17px] flex items-center justify-center gap-2">
      <span class="material-symbols-outlined">check</span> Guardar producto
    </button>
  </form>
`;

document.getElementById('form-producto').addEventListener('submit', function(e){
  e.preventDefault();
  const name = document.getElementById('product_name').value.trim();
  if(!name || price <= 0) return false;
  const list = state.products;
  list.push({ id: Date.now(), name, price, stock });
  state.products = list;
  location.href = '../catalogo/index.html';
});
</script>
</body>
</html>
