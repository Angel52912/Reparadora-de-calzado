<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agregar Producto · Tienda de Abarrotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="stylesheet" href="../../shared/css/estilos.css">
</head>
<body>
<div id="header"></div>
<main id="app" class="max-w-2xl mx-auto w-full pb-28 px-4"></main>
<div id="modal-root"></div>

<script src="../../shared/js/datos.js"></script>
<script src="../../shared/js/ui.js"></script>
<script>
renderHeader({ title:'Agregar Producto', backHref:'../catalogo/index.html', homeHref:'../index.html' });

document.getElementById('app').innerHTML = `
  <form id="form-producto" class="fade-in space-y-5 mt-4">
    <div>
      <label for="product_name">Nombre del producto</label>
      <input id="product_name" type="text" placeholder="Ej. Arroz 1kg" required>
    </div>
    <div>
      <label for="price">Precio unitario</label>
      <input id="price" type="number" min="0" step="0.01" placeholder="0.00" required>
    </div>
    <button type="submit" class="btn-primary tap w-full py-4 text-[17px] flex items-center justify-center gap-2">
      <span class="material-symbols-outlined">check</span> Guardar producto
    </button>
  </form>
`;

document.getElementById('form-producto').addEventListener('submit', function(e){
  e.preventDefault();
  const name = document.getElementById('product_name').value.trim();
  const price = parseFloat(document.getElementById('price').value);
  if(!name || isNaN(price)) return false;
  const list = state.products;
  list.push({ id: Date.now(), name, price });
  state.products = list;
  location.href = '../catalogo/index.html';
});
</script>
</body>
</html>
